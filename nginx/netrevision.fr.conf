# Redirect old domain to new
server {
    listen 80;
    server_name revision.quernel-cloud.com;
    return 301 https://netrevision.fr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name revision.quernel-cloud.com;

    ssl_certificate /etc/letsencrypt/live/revision.quernel-cloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/revision.quernel-cloud.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://netrevision.fr$request_uri;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name netrevision.fr www.netrevision.fr;
    return 301 https://netrevision.fr$request_uri;
}

# Main server block
server {
    listen 443 ssl http2;
    server_name netrevision.fr www.netrevision.fr;

    ssl_certificate /etc/letsencrypt/live/netrevision.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netrevision.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /clients/revision-reseaux/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # API Backend (Symfony) - CORS handled by NelmioCorsBundle
    location ~ ^/api/ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /clients/revision-reseaux/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /clients/revision-reseaux/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
