version: '3.8'

services:
  revision_mysql:
    image: mysql:8.0
    container_name: revision-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-revision_reseaux}
      MYSQL_USER: ${MYSQL_USER:-revision_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_password}
    volumes:
      - revision_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  revision_mysql_data:
